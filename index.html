<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script>
const offerMap = {
  'HDSK8X7K2': 'Hdfcsky',
  'STOR9X3K1': 'StoryMax',
  'WOWT5X2K9': 'WowTv'
};

const params = new URLSearchParams(window.location.search);
const cid = params.get('cid');
const offer = offerMap[cid];

if (offer) {
  // ✅ URL change nahi hoga
  fetch('/offers/' + offer + '.html')
    .then(r => r.text())
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    });
} else {
  document.body.innerHTML = '<h2 style="text-align:center;margin-top:40px;font-family:sans-serif;">Invalid Link</h2>';
}
</script>
</body>
</html>
